<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المناقصات والمزادات الذكية - AI Tendering</title>
    
    <!-- Google Fonts: Cairo & Tajawal -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="css/main.css">
</head>
    <!-- Login Screen Container -->
    <div id="login-screen" class="login-screen">
        <!-- Content injected by main.js -->
    </div>

    <div class="app-layout hidden" id="app-layout">
        <!-- Sidebar Container -->
        <aside class="sidebar glass-panel" id="sidebar-container">
            <!-- Content generated by sidebar.js -->
        </aside>

        <!-- Main Content Wrapper -->
        <div class="main-wrapper">
            <!-- Topbar -->
            <header class="topbar glass-panel">
                <div class="topbar-right">
                    <button id="toggle-sidebar" class="icon-btn">
                        <i class="fa-solid fa-bars-staggered"></i>
                    </button>
                    <h2 id="page-title" style="margin: 0; font-size: 1.25rem;">لوحة التحكم</h2>
                </div>
                
                <div class="topbar-left">
                    <button class="btn ai-assistant-btn" title="مساعد الذكاء الاصطناعي">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                        <span>مساعد AI</span>
                    </button>
                    
                    <div class="icon-btn has-badge">
                        <i class="fa-regular fa-bell"></i>
                        <span class="badge">3</span>
                    </div>
                    
                    <div class="user-profile" id="user-profile-trigger">
                        <div class="user-info">
                            <span class="user-name" id="current-user-name">أحمد حسن</span>
                            <span class="user-role" id="current-user-role">ناشر (مشتري)</span>
                        </div>
                        <div class="avatar">
                            <img src="https://ui-avatars.com/api/?name=أحمد+حسن&background=4F46E5&color=fff&rounded=true" alt="User Avatar">
                        </div>
                    </div>
                </div>
            </header>

            <!-- Dynamic Content Area -->
            <main class="content-area" id="main-content">
                <!-- Content injected by main.js -->
                <div class="glass-panel" style="padding: 3rem; text-align: center;">
                    <div class="ai-orb" style="margin: 0 auto 2rem;"></div>
                    <h3 class="text-gradient" style="font-size: 1.5rem;">جاري تحميل بيانات المنصة...</h3>
                </div>
            </main>
        </div>
    </div>

    <!-- AI Analysis Overlay -->
    <div id="ai-overlay" class="ai-overlay hidden">
        <div class="ai-loader">
            <div class="ai-orb"></div>
            <div class="ai-ring"></div>
            <h2 class="ai-text">تحليل الذكاء الاصطناعي</h2>
            <ul id="ai-steps" class="ai-steps">
                <!-- Steps injected by main.js -->
            </ul>
        </div>
    </div>

    <!-- Firebase SDKs (Compat version for Vanilla JS) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- Excel Library (SheetJS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/twilio-config.js"></script>
    <script src="js/gmail-config.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // Note: Public Key will be initialized once available in window.gmailConfig
            console.log("EmailJS SDK Script Loaded.");
        })();
    </script>
    <script src="js/sidebar.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
